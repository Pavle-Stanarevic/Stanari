spring.application.name=backend

# Render šalje PORT u env varijabli PORT
server.port=${PORT:8080}

# BAZA - čita podatke iz env varijabli, ima default za lokalni rad
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stanari}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stanari}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stanari}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.h2.console.enabled=false

google.clientId=600239916040-o848a30krkb65v99q0j04ee8v7lul250.apps.googleusercontent.com
